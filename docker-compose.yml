services:
  carib-clear:
    build: .
    container_name: carib-clear-demo
    ports:
      - "8080:8080"
    environment:
      - STELLAR_INTEGRATION_TEST=0
    command: >
      sh -c "
        echo '=== CARIB-CLEAR Test Suite ===' &&
        python3 -m pytest tests/ -q --ignore=tests/test_openrouter.py --ignore=tests/test_openrouter2.py &&
        echo '' &&
        echo '=== CARIB-CLEAR Buildathon Demo ===' &&
        python3 -m carib_clear.demo full
      "
