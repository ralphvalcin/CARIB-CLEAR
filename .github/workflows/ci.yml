name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[stellar]"

      - name: Run tests
        run: |
          python3 -m pytest tests/ -v --ignore=tests/test_openrouter.py --ignore=tests/test_openrouter2.py

  docker:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t carib-clear .
      - name: Verify image runs
        run: docker run --rm carib-clear python3 -c "import carib_clear; print('OK:', carib_clear.__version__)"
